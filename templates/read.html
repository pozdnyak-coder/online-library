<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }} — Чтение</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f9f7fe;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .reader-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 2.5rem 2.8rem;
            border: 1px solid #ede8f5;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2rem;
            color: #5b5b7a;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #667eea;
        }
        .book-header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #eae3f5;
            padding-bottom: 1.5rem;
        }
        .book-header h1 {
            font-family: 'Merriweather', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e1e2f;
            margin-bottom: 0.5rem;
        }
        .book-header h3 {
            font-size: 1.3rem;
            font-weight: 400;
            color: #5b5b7a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .book-content {
            font-family: 'Merriweather', serif;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #2d2d44;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 600px) {
            .reader-container { padding: 1.8rem; }
            .book-header h1 { font-size: 2rem; }
            .book-content { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="reader-container">
        <a href="{{ url_for('index') }}" class="back-link">
            <i class="fas fa-arrow-left"></i> Назад в библиотеку
        </a>
        <div class="book-header">
            <h1>{{ book.title }}</h1>
            <h3><i class="fas fa-user-pen"></i> {{ book.author }}</h3>
        </div>
        <div class="book-content">
            {{ book.content }}
        </div>
    </div>
</body>
</html>
